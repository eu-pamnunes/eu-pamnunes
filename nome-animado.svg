<svg fill="none" viewBox="0 0 600 100" width="600" height="100" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height: 100%; display: flex; align-items: center; justify-content: center;">
      
      <style>
        .nome{
        
        font-family: 'Caveat', Cursive;
        font-size: 28px;
        font-weight: bold;
        color: #745692;

        width: 100%;
        max-width: fit-content;
        overflow: hidden;
        white-space: nowrap;
        clip-path: inset(0 100% 0 0);
        display: block;
        border-right: 3px solid;
        
        animation: escrita 3.5s steps(30) forwards, pisca-cursor 0.8s infinite;
        }

        @keyframes escrita {
        from { clip-path: inset(0 100% 0 0); }
        to { clip-path: inset(0 0 0 0); }
        
        }

         @keyframes pisca-cursor {
        from, to { border-color: transparent; }
        50% { border-color: #745692; }
        
        } 
      </style>
      
      <div class="nome" style="width: fit-content;">Oi, eu me chamo Pâmela Nunes :)</div>
    </div>
  </foreignObject>
</svg>
