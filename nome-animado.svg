<svg fill="none" viewBox="0 0 600 100" width="600" height="100" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height: 100%; display: flex; align-items: center; justify-content: center;">
      <style>
        .nome {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          font-size: 45px;
          font-weight: bold;
          color: #FF69B4;
          animation: pulso 2s ease-in-out infinite;
        }
        @keyframes pulso {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.1); color: #FF1493; }
        }
      </style>
      <div class="nome">Pâmela Nunes</div>
    </div>
  </foreignObject>
</svg>
